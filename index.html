<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="login.css"  />
</head>

<body>


<div class="log"> 
<h2>Login Page</h2>

<!-- Username -->
<input type="text" id="input" placeholder="Username">
<br><br>

<!-- Email -->
<input type="email" id="email" placeholder="Email">
<br><br>

<!-- Password -->
<input type="password" id="pass" placeholder="Password">
<br><br>

<!-- Show / Hide password -->
<button id="show">Show Password</button>
<br><br>

<!-- Login button -->
<button id="sub">Login</button>

<!-- Message -->
<h4 id="msg"></h4>
</div>
<!-- JS file -->
<script src="login.js"></script>

</body>
</html>
